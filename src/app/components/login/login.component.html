<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="logo-title">
        <span class="logo-req">Req</span><span class="logo-bot">Bot</span>
      </h1>
      <p class="logo-tagline">Escolha como quer entrar</p>
    </div>

    <div class="role-toggle">
      <a routerLink="admin" routerLinkActive="active" class="role-option">Owner/Admin</a>
      <a routerLink="user" routerLinkActive="active" class="role-option">Usuario</a>
    </div>

    <div class="auth-section">
      <p class="auth-label">Entrar com Google</p>
      <router-outlet></router-outlet>
    </div>
  </div>

  <div class="status-footer">
    <span class="status-dot"></span>
    API conectada ao Render
  </div>
</div>
